schema {
  query: Query
  mutation: Mutation
}

# -----------------------------------------
# SCALARS (Imported from Schema 2)
# -----------------------------------------
"""Leverages the internal implementation of UUID to provide native UUID objects."""
scalar UUID

"""The Decimal scalar type represents a strict floating-point number for financial accuracy."""
scalar Decimal

"""The DateTime scalar type represents a DateTime value as specified by ISO 8601."""
scalar DateTime

# -----------------------------------------
# INTERFACES (From Schema 1 - Relay Standards)
# -----------------------------------------
interface Node {
  id: ID!
}

interface MutationResponse {
  code: String!
  success: Boolean!
  message: String!
}

# -----------------------------------------
# ENUMS (Imported from Schema 2)
# -----------------------------------------
enum UserRole {
  CUSTOMER
  RESTAURANT_OWNER
  ADMIN
  MODERATOR
}

enum RestaurantCategory {
  ITALIAN
  CHINESE
  MEXICAN
  AMERICAN
  INDIAN
  THAI
  JAPANESE
  MEDITERRANEAN
  SOUL
  BBQ
}

enum MenuItemCategory {
  ENTREE
  SIDE
  DRINK
  DESSERT
  APPETIZER
}

enum RatingEmoji {
  A_      # Mind Blown
  A__1    # Love It
  A__2    # Neutral
  A__3    # Dislike
  A__4    # Hate It
}

enum OrderStatus {
  PENDING
  PREPARING
  READY
  COMPLETED
  CANCELLED
  REFUNDED
}

enum OrderPaymentStatus {
  PENDING
  PROCESSING
  COMPLETED
  FAILED
  REFUNDED
}

enum FriendStatus {
  PENDING
  ACCEPTED
  BLOCKED
}

enum CartItemType {
  MENUITEM
  COMBO
}

# -----------------------------------------
# UNIONS (From Schema 1)
# -----------------------------------------
union SearchResult = Restaurant | MenuItems
union RatedObject = MenuItems | Combos | Restaurant

# -----------------------------------------
# TYPES (Merged & Upgraded)
# -----------------------------------------
type User implements Node {
  id: ID!
  username: String!
  firstName: String!
  lastName: String!
  email: String!
  password: String!
  avatar: String
  bio: String
  isActive: Boolean!
  role: UserRole!
  friends: [Friend]
  cart: Cart
}

type Auth {
  token: String
  user: User
}

type Restaurant implements Node {
  id: ID!
  name: String!
  description: String!
  phoneNumber: String!
  email: String!
  website: String!
  category: RestaurantCategory!
  isVerified: Boolean!
  averageRating: Decimal!
  location: String!
  contactInfo: String!
  images: [String]
  hours: String
  menuItems: [MenuItems]
  combos: [Combos]
  ratings: [Rating]
  owner: User!
  myOrders: [Order]
}

type MenuItems implements Node {
  id: ID!
  name: String!
  description: String!
  category: MenuItemCategory!
  price: Decimal!
  discountPrice: Decimal
  calories: Int
  ingredients: String!
  isVegetarian: Boolean!
  isVegan: Boolean!
  images: [String]
  averageRating: Decimal!
  caption: String
  inStock: Boolean
  ratings: [Rating]
  restaurant: Restaurant
}

type Combos implements Node {
  id: ID!
  title: String!
  description: String!
  menuItems: [MenuItems!]!
  price: Decimal!
  originalPrice: Decimal!
  isAvailable: Boolean!
  averageRating: Decimal!
  ratings: [Rating]
}

type Rating implements Node {
  id: ID!
  user: User!
  emoji: RatingEmoji!
  title: String!
  comment: String
  ratingText: String
  ratingScore: Int!
  helpfulCount: Int!
  createdAt: DateTime!
  images: [String]
  menuItem: MenuItems
  ratedId: RatedObject
}

type Friend implements Node {
  id: ID!
  username: String! # Legacy support
  user: User!
  friend: User!
  status: FriendStatus!
  createdAt: DateTime!
}

type Cart implements Node {
  id: ID!
  user: User!
  items: [CartItem]
  totalPrice: Decimal
}

type CartItem implements Node {
  id: ID!
  menuItem: MenuItems
  combo: Combos
  quantity: Int!
  specialInstructions: String
  unitPrice: Decimal!
}

type Order implements Node {
  id: ID!
  orderNumber: String!
  customer: User
  restaurant: Restaurant!
  items: [OrderItem]!
  totalPrice: Decimal!
  status: OrderStatus!
  paymentStatus: OrderPaymentStatus!
  createdAt: DateTime!
  completedAt: DateTime
}

type OrderItem {
  name: String!
  priceAtPurchase: Decimal!
  quantity: Int!
  total: Decimal!
  itemReference: MenuItems
}

# -----------------------------------------
# QUERIES
# -----------------------------------------
type Query {
  node(id: ID!): Node
  me: User
  menuItems(restaurantId: UUID): [MenuItems!]
  users: [User]
  combos: [Combos]
  ratings: [Rating]
  restaurants: [Restaurant]
  restaurantsByCategory(category: RestaurantCategory!): [Restaurant]
  friends: [Friend]
  cart: Cart
  orders: [Order]
  myOrders: [Order]
  globalSearch(searchTerm: String!): [SearchResult!]!
}

# -----------------------------------------
# MUTATION INPUTS & PAYLOADS
# -----------------------------------------

# Auth
input CreateUserInput {
  username: String!
  firstName: String!
  lastName: String!
  password: String!
  email: String!
  clientMutationId: String
}

type CreateUserPayload implements MutationResponse {
  code: String!
  success: Boolean!
  message: String!
  token: String
  user: User
  clientMutationId: String
}

input LoginInput {
  username: String!
  password: String!
  clientMutationId: String
}

type LoginPayload implements MutationResponse {
  code: String!
  success: Boolean!
  message: String!
  token: String
  user: User
  clientMutationId: String
}

# Ratings
input CreateRatingInput {
  ratedId: ID
  emoji: RatingEmoji!
  onModel: String!
  ratingText: String
  ratingScore: Int
  images: [String]
  clientMutationId: String
}

type CreateRatingPayload implements MutationResponse {
  code: String!
  success: Boolean!
  message: String!
  rating: Rating
  clientMutationId: String
}

input DeleteRatingInput {
  id: ID!
  clientMutationId: String
}

type DeleteRatingPayload implements MutationResponse {
  code: String!
  success: Boolean!
  message: String!
  rating: Rating
  clientMutationId: String
}

# Combos
input CreateCombosInput {
  title: String!
  description: String!
  menuItems: [ID!]!
  price: Decimal!
  originalPrice: Decimal!
  clientMutationId: String
}

type CreateCombosPayload implements MutationResponse {
  code: String!
  success: Boolean!
  message: String!
  combos: Combos
  clientMutationId: String
}

input DeleteCombosInput {
  title: String!
  clientMutationId: String
}

type DeleteCombosPayload implements MutationResponse {
  code: String!
  success: Boolean!
  message: String!
  combos: Combos
  clientMutationId: String
}

input EditCombosInput {
  title: String!
  description: String
  menuItems: [ID!]
  price: Decimal
  clientMutationId: String
}

type EditCombosPayload implements MutationResponse {
  code: String!
  success: Boolean!
  message: String!
  combos: Combos
  clientMutationId: String
}

# Menu Items
input CreateMenuItemInput {
  name: String!
  description: String!
  ingredients: String!
  calories: Int
  price: Decimal!
  category: MenuItemCategory!
  isVegetarian: Boolean = false
  isVegan: Boolean = false
  images: [String]
  restaurantId: ID!
  clientMutationId: String
}

type CreateMenuItemPayload implements MutationResponse {
  code: String!
  success: Boolean!
  message: String!
  menuItem: MenuItems
  clientMutationId: String
}

input DeleteMenuItemInput {
  name: String!
  clientMutationId: String
}

type DeleteMenuItemPayload implements MutationResponse {
  code: String!
  success: Boolean!
  message: String!
  menuItem: MenuItems
  clientMutationId: String
}

input EditMenuItemInput {
  id: ID!
  name: String
  price: Decimal
  inStock: Boolean
  clientMutationId: String
}

type EditMenuItemPayload implements MutationResponse {
  code: String!
  success: Boolean!
  message: String!
  menuItem: MenuItems
  clientMutationId: String
}

input ToggleStockStatusInput {
  id: ID!
  inStock: Boolean!
  clientMutationId: String
}

type ToggleStockStatusPayload implements MutationResponse {
  code: String!
  success: Boolean!
  message: String!
  menuItem: MenuItems
  clientMutationId: String
}

# Restaurants
input CreateRestaurantInput {
  name: String!
  description: String!
  category: RestaurantCategory!
  location: String!
  contactInfo: String!
  phoneNumber: String!
  email: String!
  website: String!
  images: [String]
  hours: String
  clientMutationId: String
}

type CreateRestaurantPayload implements MutationResponse {
  code: String!
  success: Boolean!
  message: String!
  restaurant: Restaurant
  clientMutationId: String
}

input EditRestaurantInput {
  id: ID!
  name: String
  description: String
  category: RestaurantCategory
  location: String
  contactInfo: String
  phoneNumber: String
  email: String
  website: String
  images: [String]
  hours: String
  clientMutationId: String
}

type EditRestaurantPayload implements MutationResponse {
  code: String!
  success: Boolean!
  message: String!
  restaurant: Restaurant
  clientMutationId: String
}

input DeleteRestaurantInput {
  id: ID!
  clientMutationId: String
}

type DeleteRestaurantPayload implements MutationResponse {
  code: String!
  success: Boolean!
  message: String!
  restaurant: Restaurant
  clientMutationId: String
}

input ClaimRestaurantOwnershipInput {
  id: ID!
  clientMutationId: String
}

type ClaimRestaurantOwnershipPayload implements MutationResponse {
  code: String!
  success: Boolean!
  message: String!
  restaurant: Restaurant
  clientMutationId: String
}

# Cart & Orders
input AddToCartInput {
  id: ID!
  itemType: CartItemType!
  quantity: Int = 1
  specialInstructions: String
  clientMutationId: String
}

type AddToCartPayload implements MutationResponse {
  code: String!
  success: Boolean!
  message: String!
  cart: Cart
  clientMutationId: String
}

input RemoveFromCartInput {
  id: [ID!]!
  clientMutationId: String
}

type RemoveFromCartPayload implements MutationResponse {
  code: String!
  success: Boolean!
  message: String!
  cart: Cart
  clientMutationId: String
}

input OrderItemInput {
  menuItemId: ID!
  quantity: Int!
  specialInstructions: String
}

input CreateOrderInput {
  restaurantId: ID!
  items: [OrderItemInput!]!
  clientMutationId: String
}

type CreateOrderPayload implements MutationResponse {
  code: String!
  success: Boolean!
  message: String!
  order: Order
  clientMutationId: String
}

input CheckoutInput {
  restaurantId: ID!
  clientMutationId: String
}

type CheckoutPayload implements MutationResponse {
  code: String!
  success: Boolean!
  message: String!
  order: Order
  clientMutationId: String
}

input UpdateOrderStatusInput {
  orderId: ID!
  status: OrderStatus!
  clientMutationId: String
}

type UpdateOrderStatusPayload implements MutationResponse {
  code: String!
  success: Boolean!
  message: String!
  order: Order
  clientMutationId: String
}

input DeleteOrderInput {
  orderId: ID!
  clientMutationId: String
}

type DeleteOrderPayload implements MutationResponse {
  code: String!
  success: Boolean!
  message: String!
  order: Order
  clientMutationId: String
}

# -----------------------------------------
# MUTATION TYPE
# -----------------------------------------
type Mutation {
  createUser(input: CreateUserInput!): CreateUserPayload
  login(input: LoginInput!): LoginPayload
  
  toggleStockStatus(input: ToggleStockStatusInput!): ToggleStockStatusPayload
  createMenuItems(input: CreateMenuItemInput!): CreateMenuItemPayload
  deleteMenuItems(input: DeleteMenuItemInput!): DeleteMenuItemPayload
  editMenuItems(input: EditMenuItemInput!): EditMenuItemPayload
  
  createCombos(input: CreateCombosInput!): CreateCombosPayload
  deleteCombos(input: DeleteCombosInput!): DeleteCombosPayload
  editCombos(input: EditCombosInput!): EditCombosPayload
  
  createRestaurant(input: CreateRestaurantInput!): CreateRestaurantPayload
  editRestaurant(input: EditRestaurantInput!): EditRestaurantPayload
  deleteRestaurant(input: DeleteRestaurantInput!): DeleteRestaurantPayload
  claimRestaurantOwnership(input: ClaimRestaurantOwnershipInput!): ClaimRestaurantOwnershipPayload
  
  createRating(input: CreateRatingInput!): CreateRatingPayload
  deleteRating(input: DeleteRatingInput!): DeleteRatingPayload
  
  addToCart(input: AddToCartInput!): AddToCartPayload
  removeFromCart(input: RemoveFromCartInput!): RemoveFromCartPayload
  
  createOrder(input: CreateOrderInput!): CreateOrderPayload
  checkout(input: CheckoutInput!): CheckoutPayload
  updateOrderStatus(input: UpdateOrderStatusInput!): UpdateOrderStatusPayload
  deleteOrder(input: DeleteOrderInput!): DeleteOrderPayload
}
```